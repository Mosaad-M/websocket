[package]
name = "websocket"
version = "1.0.2"
description = "Pure-Mojo WebSocket client (RFC 6455) with TLS support"
license = "MIT"
platforms = ["linux-64", "osx-arm64"]

[mojo]
requires = ">=0.26.2"

[dependencies]
tls = { git = "Mosaad-M/tls", version = ">=1.0.0" }
tcp = { git = "Mosaad-M/tcp", version = ">=1.0.0" }
url = { git = "Mosaad-M/url", version = ">=1.0.0" }
