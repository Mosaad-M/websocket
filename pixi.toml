[workspace]
channels = ["https://conda.modular.com/max", "conda-forge"]
name = "websocket"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
run = "bash build_and_run.sh main.mojo"
test = "bash -c 'python test_ws_server.py & sleep 1 && bash build_and_run.sh test_websocket.mojo; RET=$?; kill %1 2>/dev/null; exit $RET'"
format = "mblack websocket.mojo main.mojo test_websocket.mojo"

[dependencies]
mojo = ">=0.26.2"
